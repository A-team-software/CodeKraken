# docker-compose.yml

services:
  # Your main application development service
  app:
    build:
      context: .
      # dockerfile: Dockerfile.dev
    container_name: ${COMPOSE_PROJECT_NAME:-my_monorepo}_app
    volumes:
      - .:/app
      # - node_modules:/app/node_modules # See note below about node_modules persistence
      - pnpm_store:/root/.local/share/pnpm/store/v3
      - turbo_cache:/app/.turbo
    stdin_open: true
    tty: true
    ports:
      - "3002:3002" # Example: Next.js frontend
      - "5001:5001" # Example: Express API
      # Add other ports your apps/services use
    env_file:
      - ".env"
    environment:
      # --- Database Connection ---
      # Service name 'mongo' is used as the hostname because Docker Compose
      # puts services on the same default network.
      # Make sure your Mongoose connection uses this URI.
      # IMPORTANT: Add 'authSource=admin' because the root user is created in the 'admin' database.
      - MONGO_DB_URI=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/${DB_NAME}?authSource=admin
      - DB_NAME=${DB_NAME} # Your application database name

      # --- Other App Variables ---
      - NODE_ENV=development
      # - REDIS_URL=${REDIS_URL}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_CALLBACK_URL=${GITHUB_CALLBACK_URL}
      - APP_SECRET=${APP_SECRET}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - GITHUB_SCOPES=${GITHUB_SCOPES}
      - SESSION_COOKIE_NAME=${SESSION_COOKIE_NAME}
      - ACCESS_TOKEN_COOKIE_NAME=${ACCESS_TOKEN_COOKIE_NAME}
      - LOG_LEVEL=debug
      - DOCKER_CONTAINER=true

    # Make sure the app service waits for the mongo service to start
    # Note: This only waits for the container to start, not for MongoDB process to be fully ready.
    # Your app should have retry logic for the DB connection.
    depends_on:
      - mongo

    # By default, services are connected to a default network,
    # allowing them to reach each other via service name (e.g., 'mongo')

  # MongoDB Service
  mongo:
    image: mongo:latest # Or specify a version like mongo:6.0
    container_name: ${COMPOSE_PROJECT_NAME:-my_monorepo}_mongo
    ports:
      # Expose port 27017 to the host machine (optional, for external tools like MongoDB Compass)
      # Make sure port 27017 is free on your host if you uncomment this.
      - "27017:27017"
    environment:
      # These credentials are used to create the initial root user in the 'admin' database.
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    volumes:
      # Persist MongoDB data using a named volume
      - mongo_data:/data/db
    # Add healthcheck (optional but recommended)
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s # Give mongo time to initialize

# Define the named volumes used above
volumes:
  node_modules: # Still defined, but commented out in 'app' service - decide if you need it
  pnpm_store:
  turbo_cache:
  mongo_data: # Named volume for MongoDB data persistence
