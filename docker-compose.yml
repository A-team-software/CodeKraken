services:
  # Your main application development service
  app:
    # Tells docker-compose to build the image from the Dockerfile in the current directory
    build:
      context: .
      # Optionally specify the Dockerfile name if not 'Dockerfile'
      # dockerfile: Dockerfile.dev
    container_name: ${COMPOSE_PROJECT_NAME:-my_monorepo}_app # Set a predictable container name
    # Mount the entire project directory into the container's /app directory
    # This allows live code changes on your host to reflect inside the container
    volumes:
      - .:/app
      # Use a named volume for node_modules to persist them independently
      # of the host and avoid potential OS conflicts (e.g., macOS vs Linux native modules).
      # This overrides the node_modules directory from the bind mount above.
      - node_modules:/app/node_modules
      # Persist the pnpm store within a volume (optional, but speeds up subsequent installs)
      - pnpm_store:/root/.local/share/pnpm/store/v3 # Path might vary slightly based on pnpm/OS config
      # Persist the Turborepo cache
      - turbo_cache:/app/.turbo

    # Keep the container running. Use 'command' to override the Dockerfile CMD if needed.
    # Option 1: Keep container running idly (use `docker-compose exec` for commands) - Recommended
    stdin_open: true # Equivalent to -i
    tty: true # Equivalent to -t

    # Option 2: Start the development server directly (adjust command as needed)
    # command: pnpm run dev # Or your turbo command like "pnpm turbo run dev --parallel"

    # Map ports from your host machine to the container (host:container)
    # Adjust these based on the ports your apps/services use
    ports:
      - "3000:3000" # Example: Next.js frontend
      - "5001:5001" # Example: Express API
        # Use env_file to load variables directly into the container environment
    env_file:
      - .env.development # Load variables from this file
      # Add other ports as needed

    # Set environment variables
    environment:
      - NODE_ENV=development
      # --- IMPORTANT: Connecting to your EXTERNAL MongoDB ---
      # If Mongo is running in another Docker container *on the same user-defined network*,
      # you could use its service name (e.g., mongodb://mongo:27017).
      # If Mongo is running as a container but *not* defined in this compose file,
      # you need to connect them to the same network OR use host networking/IPs.
      # If Mongo is running directly on your HOST machine (outside Docker):
      # Use 'host.docker.internal' which resolves to the host's IP from within the container (on Docker Desktop Mac/Win).
      # On Linux, this might be the gateway IP of the docker bridge (often 172.17.0.1) or use `extra_hosts`.
      - MONGODB_URI=${MONGODB_URI} # Replace with your actual connection string logic
      - DB_NAME=${DB_NAME}
      - REDIS_URL=${REDIS_URL}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_CALLBACK_URL=${GITHUB_CALLBACK_URL}
      - APP_SECRET=${APP_SECRET}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - GITHUB_SCOPES=${GITHUB_SCOPES}
      - SESSION_COOKIE_NAME=${SESSION_COOKIE_NAME}
      - ACCESS_TOKEN_COOKIE_NAME=${ACCESS_TOKEN_COOKIE_NAME}

      - LOG_LEVEL=debug
      - DOCKER_CONTAINER=true # Useful flag to know code is running in Docker

      # Add other necessary environment variables
      # - API_KEY=your_dev_key
      # - NEXT_PUBLIC_API_URL=http://localhost:5001

    # --- Connecting to the external MongoDB container's network (Alternative) ---
    # If your MongoDB container is running and attached to a specific Docker network (e.g., 'mongo-net'),
    # you can attach this 'app' service to that same network.
    # networks:
    #   - default # Keep the default network for compose internal communication if needed
    #   - mongo-net # Connect to the external network MongoDB is on

    # --- Linux Host Connection Alternative ---
    # On Linux, if host.docker.internal doesn't work, you might need:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway" # Newer Docker versions
    # Or find the bridge IP (docker network inspect bridge) and use it directly:
    # environment:
    #   - DATABASE_URL=mongodb://172.17.0.1:27017/your_dev_db

# Define the named volumes used above
volumes:
  node_modules:
  pnpm_store:
  turbo_cache:
# Define external networks if needed (see commented 'networks' section above)
# networks:
#   mongo-net:
#     external: true # Assumes a network named 'mongo-net' already exists
