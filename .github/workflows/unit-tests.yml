name: Unit Tests

on:
  push:
    branches: ['**']

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.15.9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run processor service unit tests
        run: pnpm --filter server exec vitest run src/app/services/pr/pull-request-comments-processor-service.test.ts

      - name: Run comments route unit tests
        run: pnpm --filter server exec vitest run src/app/api/webhooks/pr/comments/route.test.ts

      - name: Run patch route unit tests
        run: pnpm --filter server exec vitest run src/app/api/task/route.patch.unit.test.ts
