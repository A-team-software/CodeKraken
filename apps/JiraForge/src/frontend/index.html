<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Git Integration</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 20px;
            margin: 0;
            background: #f4f5f7;
            color: #172b4d;
        }
        h2 { margin-top: 0; font-size: 18px; }

        /* ── Cards ── */
        .card {
            background: #fff;
            border: 1px solid #dfe1e6;
            border-radius: 6px;
            padding: 16px 20px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .card-info h3 { margin: 0 0 4px; font-size: 15px; }
        .card-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

        /* ── Buttons ── */
        .btn {
            padding: 7px 14px;
            cursor: pointer;
            border-radius: 4px;
            border: none;
            font-size: 13px;
            font-weight: 600;
            transition: opacity .15s;
        }
        .btn:disabled { opacity: .55; cursor: default; }
        .btn-connect    { background: #0052cc; color: #fff; }
        .btn-connect:hover:not(:disabled) { background: #0065ff; }
        .btn-disconnect { background: #ffebe6; color: #bf2600; }
        .btn-disconnect:hover:not(:disabled) { background: #ffbdad; }

        /* ── Status badges ── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 20px;
        }
        .badge-connected    { background: #e3fcef; color: #006644; }
        .badge-disconnected { background: #f4f5f7; color: #5e6c84; }
        .badge-checking     { background: #fffae6; color: #ad6800; }
        .badge-error        { background: #ffebe6; color: #bf2600; }

        /* ── Repo selector  ── */
        #repo-section {
            background: #fff;
            border: 1px solid #dfe1e6;
            border-radius: 6px;
            padding: 16px 20px;
            margin-bottom: 16px;
            display: none;
        }
        #repo-section h3 { margin: 0 0 10px; font-size: 15px; }
        .repo-row { display: flex; gap: 10px; align-items: center; }
        #repo-select {
            flex: 1;
            padding: 7px 10px;
            border: 1px solid #dfe1e6;
            border-radius: 4px;
            font-size: 13px;
            background: #fff;
        }
        #repo-select:focus { outline: 2px solid #0052cc; }
        .repo-loading { color: #5e6c84; font-size: 13px; }

        /* ── Misc ── */
        .loading-screen { color: #5e6c84; font-size: 14px; }
        .error-msg { color: #bf2600; font-size: 14px; }
    </style>
</head>
<body>
    <h2>Git Integration</h2>

    <!-- Provider cards -->
    <div id="container"><p class="loading-screen">Loading integrations…</p></div>

    <!-- Repository selector — shown when at least one provider is connected -->
    <div id="repo-section">
        <h3>Select a Repository</h3>
        <div class="repo-row">
            <select id="repo-select"><option value="">Loading repositories…</option></select>
            <button class="btn btn-connect" id="btn-use-repo" disabled onclick="useRepo()">Use Repo</button>
        </div>
        <p id="repo-error" class="error-msg" style="display:none;margin:8px 0 0;"></p>
    </div>

    <script src="https://unpkg.com/@forge/bridge/out/index.js"></script>
    <script>
        const { invoke } = forge;

        let providers = [];
        let connectedProvider = null; // track which provider is connected
        let pollInterval = null;

        // ────────────────────────────────────────────────────────────
        // INIT
        // ────────────────────────────────────────────────────────────
        async function init() {
            try {
                const providersResponse = await invoke('getGitProviders');
                providers = providersResponse.providers || ['github'];
                renderProviders(providers);

                for (const provider of providers) {
                    await checkStatus(provider);
                }

                // Listen for OAuth popup completion
                window.addEventListener('message', async (event) => {
                    if (event.data?.type === 'OAUTH_COMPLETE') {
                        if (event.data.payload?.success) {
                            for (const provider of providers) {
                                await checkStatus(provider);
                            }
                        } else {
                            alert('OAuth Failed: ' + event.data.payload?.error);
                        }
                    }
                });

            } catch (e) {
                document.getElementById('container').innerHTML =
                    `<p class="error-msg">Error loading: ${e.message}</p>`;
            }
        }

        // ────────────────────────────────────────────────────────────
        // STATUS CHECK
        // ────────────────────────────────────────────────────────────
        async function checkStatus(provider) {
            updateProviderStatusUI(provider, 'checking');
            try {
                const status = await invoke('getGithubStatus', { provider });
                if (status.connected) {
                    updateProviderStatusUI(provider, 'connected');
                    connectedProvider = provider;
                    await showRepoSelector(provider);
                } else {
                    updateProviderStatusUI(provider, 'disconnected');
                    if (connectedProvider === provider) {
                        connectedProvider = null;
                        hideRepoSelector();
                    }
                }
            } catch (e) {
                updateProviderStatusUI(provider, 'error');
            }
        }

        // ────────────────────────────────────────────────────────────
        // REPO SELECTOR
        // ────────────────────────────────────────────────────────────
        async function showRepoSelector(provider) {
            const section = document.getElementById('repo-section');
            const select  = document.getElementById('repo-select');
            const btn     = document.getElementById('btn-use-repo');
            const errEl   = document.getElementById('repo-error');

            section.style.display = 'block';
            select.innerHTML = '<option value="">Loading repositories…</option>';
            btn.disabled = true;
            errEl.style.display = 'none';

            try {
                const data = await invoke('getRepositories', { provider, page: 1, perPage: 100 });
                const repos = data.repositories ?? data.repos ?? data ?? [];

                if (!repos.length) {
                    select.innerHTML = '<option value="">No repositories found</option>';
                    return;
                }

                select.innerHTML = '<option value="">— Select a repository —</option>' +
                    repos.map(r => {
                        const name = r.full_name ?? r.name ?? r;
                        const val  = r.html_url ?? r.clone_url ?? r.full_name ?? r;
                        return `<option value="${escHtml(val)}">${escHtml(name)}</option>`;
                    }).join('');

                select.onchange = () => { btn.disabled = !select.value; };
            } catch (e) {
                errEl.textContent = 'Could not load repositories: ' + e.message;
                errEl.style.display = 'block';
                select.innerHTML = '<option value="">Error — retry later</option>';
            }
        }

        function hideRepoSelector() {
            document.getElementById('repo-section').style.display = 'none';
        }

        window.useRepo = function () {
            const select = document.getElementById('repo-select');
            const repoUrl = select.value;
            if (!repoUrl) return;
            // Emit an event or invoke a resolver to save the selected repo
            invoke('selectRepository', { repoUrl, provider: connectedProvider })
                .then(() => alert('Repository selected: ' + repoUrl))
                .catch(e => alert('Error: ' + e.message));
        };

        // ────────────────────────────────────────────────────────────
        // RENDER HELPERS
        // ────────────────────────────────────────────────────────────
        function renderProviders(providers) {
            const container = document.getElementById('container');
            container.innerHTML = '';
            providers.forEach(provider => {
                const div = document.createElement('div');
                div.className = 'card';
                div.id = `card-${provider}`;
                div.innerHTML = `
                    <div class="card-info">
                        <h3>${escHtml(provider.toUpperCase())}</h3>
                        <span id="status-${provider}"></span>
                    </div>
                    <div class="card-actions">
                        <button id="action-${provider}" class="btn" style="display:none;"
                                onclick="handleAction('${provider}')"></button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function updateProviderStatusUI(provider, status) {
            const statusEl = document.getElementById(`status-${provider}`);
            const btn      = document.getElementById(`action-${provider}`);
            if (!statusEl || !btn) return;

            if (status === 'connected') {
                statusEl.innerHTML = `<span class="badge badge-connected">✓ Connected</span>`;
                btn.textContent = 'Disconnect';
                btn.className   = 'btn btn-disconnect';
                btn.style.display = 'inline-block';
                btn.disabled = false;
                if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }

            } else if (status === 'disconnected') {
                statusEl.innerHTML = `<span class="badge badge-disconnected">Not connected</span>`;
                btn.textContent = 'Connect';
                btn.className   = 'btn btn-connect';
                btn.style.display = 'inline-block';
                btn.disabled = false;

            } else if (status === 'checking') {
                statusEl.innerHTML = `<span class="badge badge-checking">Checking…</span>`;
                btn.style.display = 'none';

            } else {
                statusEl.innerHTML = `<span class="badge badge-error">Error</span>`;
                btn.style.display = 'none';
            }
        }

        // ────────────────────────────────────────────────────────────
        // CONNECT / DISCONNECT
        // ────────────────────────────────────────────────────────────
        window.handleAction = async (provider) => {
            const btn = document.getElementById(`action-${provider}`);
            if (btn.textContent === 'Connect') {
                try {
                    btn.textContent = 'Opening…';
                    btn.disabled = true;
                    const response = await invoke('getGithubAuthUrl', { provider });
                    if (response?.loginUrl) {
                        const oauthWindow = window.open(response.loginUrl, 'GitAuth', 'width=600,height=800');
                        updateProviderStatusUI(provider, 'checking');
                        if (pollInterval) clearInterval(pollInterval);
                        pollInterval = setInterval(async () => {
                            if (oauthWindow?.closed) {
                                clearInterval(pollInterval);
                                pollInterval = null;
                                await checkStatus(provider);
                            }
                        }, 2000);
                    } else {
                        alert('Failed to get auth URL: ' + JSON.stringify(response));
                        await checkStatus(provider);
                    }
                } catch (e) {
                    alert('Error: ' + e.message);
                    await checkStatus(provider);
                }
            } else {
                try {
                    btn.textContent = 'Disconnecting…';
                    btn.disabled = true;
                    await invoke('disconnect', { provider });
                    hideRepoSelector();
                    await checkStatus(provider);
                } catch (e) {
                    alert('Error disconnecting: ' + e.message);
                    await checkStatus(provider);
                }
            }
        };

        // ────────────────────────────────────────────────────────────
        // UTILS
        // ────────────────────────────────────────────────────────────
        function escHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        init();
    </script>
</body>
</html>
