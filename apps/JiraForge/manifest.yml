modules:
  jira:command:
    - key: oliverai-modal-command-with-shortcut
      title: OliverAI
      shortcut: e t
      target:
        resource: main
      resolver:
        function: resolver
  jira:issueGlance:
    - key: oliverai-issue-glance
      title: OliverAI
      label: OliverAI
      icon: https://developer.atlassian.com/platform/forge/images/issue-panel-icon.svg
      resource: main
      resolver:
        function: resolver
  jira:issuePanel:
    - key: my-panel
      title: OliverAI Assistant
      icon: https://developer.atlassian.com/platform/forge/images/issue-panel-icon.svg
      resource: main
      resolver:
        function: resolver
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main
    path: static/oliverai/build
app:
  runtime:
    name: nodejs20.x
  id: ari:cloud:ecosystem::app/a2d49ed1-bb5e-4c26-b5fd-585625d4cab8
permissions:
  scopes:
    - storage:app
  external:
    fetch:
      backend:
        - "https://oliver-server-qw6b.vercel.app"
        - "https://github.com"
        - "https://bitbucket.org"
      client:
        - "https://oliver-oliver-client.vercel.app"
